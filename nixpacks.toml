# Pin Node for Railway/Nixpacks.
#
# NIXPACKS_NODE_VERSION and .nvmrc were ignored (Nixpacks fell back to
# Node 18). Force the nix package directly — equivalent to:
#   nix-shell -p nodejs_24 pnpm
#
# `providers = []` disables Nixpacks' auto-detection so nothing else
# sneaks a second nodejs into the derivation. Build and start commands
# are owned by railway.json.
providers = []

[phases.setup]
nixPkgs = ["nodejs_24", "pnpm"]
