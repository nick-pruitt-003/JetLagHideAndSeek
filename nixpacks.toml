# Pin Node for Railway/Nixpacks.
#
# Nixpacks' nodejs_22 attribute currently resolves to 22.11.x in its pinned
# nixpkgs snapshot, which fails Astro 6's >=22.12.0 requirement. Node 24 is
# the current LTS and resolves to a recent release in Nixpacks.
#
# Both `.nvmrc` and NIXPACKS_NODE_VERSION are set so Nixpacks picks 24
# regardless of which source it checks first.
[variables]
NIXPACKS_NODE_VERSION = "24"
